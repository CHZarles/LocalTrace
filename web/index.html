<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalTrace — Today, you focused</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/web/styles.css?v=20260705-ed-lanes" />
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="brand"><span class="brand-dot"></span><em>LocalTrace</em></div>
        <div class="live">
          <span class="live-dot"></span>
          <span class="live-meta">TODAY · 5 July 2026 · LIVE</span>
        </div>
      </header>

      <section class="hero">
        <div class="hero-eyebrow">TODAY</div>
        <div class="hero-headline-italic">Today, you focused</div>
        <div class="hero-number" id="heroNumber">0:00</div>
        <div class="hero-annotation" id="heroAnnotation">— a quieter day</div>
        <div class="hero-meta" id="heroMeta">Waiting for activity</div>
      </section>

      <div class="data-grid" id="dataGrid"></div>

      <section class="timeline">
        <div class="timeline-head">
          <div>
            <span class="timeline-eyebrow">TIMELINE</span>
            <span class="timeline-range">last 12 hours</span>
          </div>
          <div class="timeline-stats" id="timelineStats"></div>
        </div>
        <div class="timeline-axis" id="timelineAxis"></div>
        <div class="timeline-lanes" id="timelineLanes"></div>
      </section>

      <div class="bottom-row">
        <article class="panel right-now">
          <h3 class="panel-title">Right now</h3>
          <div class="now-list" id="nowList"></div>
        </article>
        <article class="panel recent-flow">
          <h3 class="panel-title">Recent flow</h3>
          <div class="flow-list" id="flowList"></div>
        </article>
        <article class="panel health">
          <h3 class="panel-title">Health</h3>
          <div class="health-pills" id="healthPills"></div>
          <p class="health-blurb" id="healthBlurb">— lowest this week</p>
        </article>
      </div>

      <footer class="command-bar" id="commandBar"></footer>
    </div>

    <script type="module" src="/web/app.js?v=20260705-ed-lanes"></script>
  </body>
</html>
