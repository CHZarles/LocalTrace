<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalTrace</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        box-sizing: border-box;
        width: 320px;
        margin: 0;
        padding: 12px;
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 650;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 28px;
        margin: 8px 0;
      }

      label {
        user-select: none;
      }

      input[type="number"] {
        box-sizing: border-box;
        width: 96px;
        padding: 5px 7px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        border-radius: 6px;
        font: inherit;
      }

      button {
        padding: 6px 10px;
        border: 1px solid rgba(127, 127, 127, 0.4);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: rgba(127, 127, 127, 0.12);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .muted {
        color: color-mix(in srgb, currentColor 72%, transparent);
        font-size: 12px;
      }

      .status {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid rgba(127, 127, 127, 0.25);
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>LocalTrace</h1>

    <div class="row">
      <label for="enabled">Enable tracking</label>
      <input id="enabled" type="checkbox" />
    </div>

    <div class="row">
      <label for="sendTitle">Send tab title</label>
      <input id="sendTitle" type="checkbox" />
    </div>

    <div class="row">
      <label for="trackBgAudio">Track background audio</label>
      <input id="trackBgAudio" type="checkbox" />
    </div>

    <div class="row">
      <label for="keepAlive">Keep alive</label>
      <input id="keepAlive" type="checkbox" />
    </div>

    <div class="row">
      <label for="port">LocalTrace port</label>
      <input id="port" type="number" min="1" max="65535" step="1" />
    </div>
    <div class="muted">Endpoint: <code id="endpointText">http://127.0.0.1:8765/events</code></div>

    <div class="actions">
      <button id="testHealth" type="button">Test Health</button>
      <span id="healthResult" class="muted"></span>
    </div>

    <div class="status">
      <div class="muted">Last status</div>
      <div id="statusLine" class="muted">(no data yet)</div>
      <div id="diagLine" class="muted"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
