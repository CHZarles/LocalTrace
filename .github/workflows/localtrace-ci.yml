name: LocalTrace CI

on:
  push:
    paths:
      - "DEVELOPMENT_WORKFLOW.md"
      - "README.md"
      - "DEVELOPING.md"
      - "WINDOWS_DEV.md"
      - "RELEASING.md"
      - "apps/**"
      - "docs/**"
      - "extension/**"
      - "localtrace_packaging/**"
      - "packaging/**"
      - "skill/**"
      - "tests/**"
      - "web/**"
      - "mkdocs.yml"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".markdownlint-cli2.yaml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/localtrace-ci.yml"
      - ".github/workflows/localtrace-release-windows.yml"
      - ".github/workflows/pr-agent-review.yml"
      - ".github/scripts/pr_agent_review.py"
  pull_request:
    paths:
      - "DEVELOPMENT_WORKFLOW.md"
      - "README.md"
      - "DEVELOPING.md"
      - "WINDOWS_DEV.md"
      - "RELEASING.md"
      - "apps/**"
      - "docs/**"
      - "extension/**"
      - "localtrace_packaging/**"
      - "packaging/**"
      - "skill/**"
      - "tests/**"
      - "web/**"
      - "mkdocs.yml"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".markdownlint-cli2.yaml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/localtrace-ci.yml"
      - ".github/workflows/localtrace-release-windows.yml"
      - ".github/workflows/pr-agent-review.yml"
      - ".github/scripts/pr_agent_review.py"

jobs:
  docs-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Install Node deps
        run: npm ci

      - name: Python lint
        run: ruff check .

      - name: Python format check
        run: ruff format --check .

      - name: Python tests
        run: pytest

      - name: Markdown lint
        run: npm run lint:md

      - name: Build docs
        run: mkdocs build --strict -f mkdocs.yml
