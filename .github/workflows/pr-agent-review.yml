name: PR Agent Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          path: trusted
          persist-credentials: false

      - name: Checkout PR head as review data
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false

      - name: Collect PR diff
        shell: bash
        run: |
          git -C trusted remote add pr-head \
            "https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
          git -C trusted fetch --no-tags --depth=1 pr-head \
            "${{ github.event.pull_request.head.sha }}"
          git -C trusted diff --no-ext-diff --unified=80 \
            "${{ github.event.pull_request.base.sha }}" FETCH_HEAD \
            > "$RUNNER_TEMP/pr.diff"

      - name: Run review agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REVIEW_AGENT_API_KEY: ${{ secrets.REVIEW_AGENT_API_KEY }}
          REVIEW_AGENT_BASE_URL: ${{ secrets.REVIEW_AGENT_BASE_URL }}
          REVIEW_AGENT_MODEL: ${{ secrets.REVIEW_AGENT_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python trusted/.github/scripts/pr_agent_review.py \
            --diff-file "$RUNNER_TEMP/pr.diff" \
            --repo-root head
